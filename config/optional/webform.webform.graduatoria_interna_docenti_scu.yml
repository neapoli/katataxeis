langcode: it
status: open
dependencies:
  module:
    - webform_entity_print
third_party_settings:
  webform_entity_print:
    template:
      header: ''
      footer: ''
      css: ''
    export_types:
      pdf:
        enabled: true
        link_text: ''
        link_attributes: {  }
weight: 0
open: null
close: null
uid: 1
template: false
archive: false
id: graduatoria_interna_docenti_scu
title: '- Graduatoria Interna Docenti Scuola Secondaria I Grado -'
description: "<p>Tipo di form da utilizzare per creare la graduatoria interna DOCENTI dell'istituto</p>"
categories: {  }
elements: |-
  dati_anagrafici:
    '#type': webform_wizard_page
    '#title': 'Dati Anagrafici'
    '#prev_button_label': 'Dati Anagrafici'
    '#next_button_label': 'Anzianità Di Servizio'
    intestazione:
      '#type': webform_flexbox
      processed_text:
        '#type': processed_text
        '#display_on': both
        '#text': '<p class="text-align-right"><strong>Al dirigente_scolastico SCOLASTICO</strong></p>'
        '#format': bootstrap_italia_2
    flex_dati_anagrafici:
      '#type': webform_flexbox
      '#align_items': center
      markup:
        '#type': webform_markup
        '#flex': 2
        '#display_on': both
        '#markup': 'Il/La sottoscritto/a'
      cognome:
        '#type': textfield
        '#title': Cognome
        '#autocomplete': 'off'
        '#readonly': true
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#flex': 2
        '#default_value': '[current-user:field_cognome]'
        '#format_items': comma
      nome:
        '#type': textfield
        '#title': Nome
        '#autocomplete': 'off'
        '#readonly': true
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#flex': 2
        '#default_value': '[current-user:field_nome]'
        '#format_items': comma
      nato:
        '#type': textfield
        '#title': 'Nato a'
        '#autocomplete': 'off'
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#flex': 2
        '#format_items': comma
      provincia:
        '#type': textfield
        '#title': Provincia
        '#autocomplete': 'off'
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#format_items': comma
    flex_dati_anagrafici2:
      '#type': webform_flexbox
      datanascita:
        '#type': date
        '#title': Il
        '#required': true
        '#format': d-m-Y
        '#format_items': comma
        '#date_date_format': d-m-Y
      residente:
        '#type': textfield
        '#title': 'Residente In'
        '#description': 'Inserire indirizzo di residenza'
        '#autocomplete': 'off'
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#format_items': comma
