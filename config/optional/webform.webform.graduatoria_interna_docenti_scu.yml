      '#type': checkbox
      '#title': 'Dichiara di essere consapevole delle responsabilità civili e penali cui va incontro in caso di dichiarazione non corrispondente al vero, ai sensi del DPR 28.12.2000 n. 445, così come modificato ed integrato dall’art. 15 della legge 16.1.2003'
      '#required': true
    primo_anno:
      '#type': radios
      '#title': "E' il primo anno di insegnamento presso il nostro Istituto"
      '#options':
        SI: SI
        'NO': 'NO'
      '#required': true
      '#default_value': 'NO'
