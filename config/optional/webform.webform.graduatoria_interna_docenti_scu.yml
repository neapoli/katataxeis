          {% set tot_c = data.titoli_generali_punti_c|render|striptags|trim|default(0)|float %}
          {% set tot_d = data.titoli_generali_punti_d|render|striptags|trim|default(0)|float %}
          {% set tot_e = data.titoli_generali_punti_e|render|striptags|trim|default(0)|float %}
          {% set tot_f = data.titoli_generali_punti_f|render|striptags|trim|default(0)|float %}
