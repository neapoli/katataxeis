        {% set tot_b_3_2 = data.anzianita_servizio_punti_b_3_2|render|striptags|trim|default(0)|float %}
        {% set tot_c_1   = data.anzianita_servizio_punti_c_1|render|striptags|trim|default(0)|float %}
        {% set tot_c_1_1 = data.anzianita_servizio_punti_c_1_1|render|striptags|trim|default(0)|float %}
        {% set tot_c_1_2 = data.anzianita_servizio_punti_c_1_2|render|striptags|trim|default(0)|float %}
        {% set tot_c_2   = data.anzianita_servizio_punti_c_2|render|striptags|trim|default(0)|float %}
