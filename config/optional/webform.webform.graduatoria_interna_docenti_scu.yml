        '#type': webform_computed_twig
        '#title': 'Sub Totale Titoli Generali ( A - H )'
        '#description': '(MAX 15 punti) Compilato/Aggiornato in automatico e visibile in Anteprima'
        '#template': |-
          {% set tot_a = data.titoli_generali_punti_a|render|striptags|trim|default(0)|float %}
          {% set tot_h = data.titoli_generali_punti_h|render|striptags|trim|default(0)|float %}
          {{ tot_a + tot_h }}
        '#store': true
      totale_titoli_generali:
        '#type': webform_computed_twig
        '#title': 'Totale Titoli Generali'
        '#description': '(MAX 25 punti) Calcolato/Aggiornato in Automatico e visibile in Anteprima'
        '#template': |-
          {% set tot_sub = data.sub_totale_titoli_generali|render|striptags|trim|default(0)|float %}
          {% set tot_a_h = data.sub_totale_titoli_generali_a_h_|render|striptags|trim|default(0)|float %}
          {% if tot_sub > 10 %}{{ 10 + tot_a_h }}{% else %}{{ tot_sub + tot_a_h }}{% endif %}
        '#store': true
