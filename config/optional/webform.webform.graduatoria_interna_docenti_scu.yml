        '#type': select
        '#title': 'Docente Di Scuola'
        '#description': '<p>Selezionare grado di scuola</p>'
        '#disabled': true
        '#options': grado_scuola
        '#required': true
        '#default_value': 'Secondaria 1° Grado'
    flex_datianagrafici3:
      '#type': webform_flexbox
      posto_secondaria:
        '#type': select
        '#title': 'Su Posto (Secondaria I Grado)'
        '#description': 'Selezionare tipologia di posto'
        '#options': tipologia_posto_secondaria_1degg
        '#states':
