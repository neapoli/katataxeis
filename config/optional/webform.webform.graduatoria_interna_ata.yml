javascript: |+
  (function ($) {
    var tot_anzianita = Number(document.getElementsByName("totale_anzianita_servizio")[0].value);
    var tot_esigenze = Number(document.getElementsByName("totale_esigenze_famiglia")[0].value);
    var tot_titoli = Number(document.getElementsByName("totale_titoli_generali")[0].value);
    document.getElementById("edit-totale-punteggio").value = tot_anzianita + tot_esigenze + tot_titoli;
  }(jQuery));

