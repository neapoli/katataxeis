  riepilogo_totali:
    '#type': webform_wizard_page
    '#title': Totali
    '#prev_button_label': 'Titoli Generali'
    '#next_button_label': Anteprima
    horizontal_rule_01:
      '#type': webform_horizontal_rule
    totale_anzianita_servizio:
      '#type': webform_computed_twig
      '#title': 'Totale Anzianità Di Servizio'
      '#description': 'Compilato/Aggiornato in automatico e visibile in Anteprima'
      '#template': |-
        {% set tot_a     = data.anzianita_servizio_punti_a|render|striptags|trim|default(0)|float %}
        {% set tot_a_1   = data.anzianita_servizio_punti_a_1|render|striptags|trim|default(0)|float %}
        {% set tot_b_1   = data.anzianita_servizio_punti_b_1|render|striptags|trim|default(0)|float %}
        {% set tot_b_1_1 = data.anzianita_servizio_punti_b_1_1|render|striptags|trim|default(0)|float %}
        {% set tot_c     = data.anzianita_servizio_punti_c|render|striptags|trim|default(0)|float %}
        {% set tot_d     = data.anzianita_servizio_punti_d|render|striptags|trim|default(0)|float %}
        {% set tot_e     = data.anzianita_servizio_punti_e|render|striptags|trim|default(0)|float %}
        {% set tot_f     = data.anzianita_servizio_punti_f|render|striptags|trim|default(0)|float %}
        {{ tot_a + tot_a_1 + tot_b_1 + tot_b_1_1 + tot_c + tot_d + tot_e + tot_f }}
      '#store': true
    totale_esigenze_famiglia:
      '#type': webform_computed_twig
      '#title': 'Totale Esigenze Di Famiglia'
      '#description': 'Calcolato/Aggiornato in Automatico e visibile in Anteprima'
      '#template': |-
        {% set tot_a   = data.esigenze_famiglia_punti_a|render|striptags|trim|default(0)|float %}
        {% set tot_b   = data.esigenze_famiglia_punti_b|render|striptags|trim|default(0)|float %}
        {% set tot_c   = data.esigenze_famiglia_punti_c|render|striptags|trim|default(0)|float %}
        {% set tot_d   = data.esigenze_famiglia_punti_d|render|striptags|trim|default(0)|float %}
        {% set tot_d_1 = data.esigenze_famiglia_punti_d_1|render|striptags|trim|default(0)|float %}
        {% set tot_e   = data.esigenze_famiglia_punti_e|render|striptags|trim|default(0)|float %}
        {{ tot_a + tot_b + tot_c + tot_d + tot_d_1 + tot_e }}
      '#store': true
    horizontal_rule:
      '#type': webform_horizontal_rule
    flex_titoli_generali:
      '#type': webform_flexbox
      '#align_items': center
      sub_totale_titoli_generali_a_h_:
        '#type': webform_computed_twig
        '#title': 'Sub Totale Titoli Generali ( A - B )'
        '#description': 'Compilato/Aggiornato in automatico e visibile in Anteprima'
        '#template': |-
          {% set tot_a = data.titoli_generali_punti_a|render|striptags|trim|default(0)|float %}
          {% set tot_b = data.titoli_generali_punti_b|render|striptags|trim|default(0)|float %}
          {{ tot_a + tot_b }}
        '#store': true
      totale_titoli_generali:
        '#type': webform_computed_twig
        '#title': 'Totale Titoli Generali'
        '#description': 'Calcolato/Aggiornato in Automatico e visibile in Anteprima'
        '#template': |-
          {% set tot_a = data.titoli_generali_punti_a|render|striptags|trim|default(0)|float %}
          {% set tot_b = data.titoli_generali_punti_b|render|striptags|trim|default(0)|float %}
          {{ tot_a + tot_b }}
        '#store': true
    horizontal_rule_02:
      '#type': webform_horizontal_rule
    totale_punteggio:
      '#type': number
      '#title': 'Totale Punteggio'
      '#autocomplete': ''
      '#readonly': true
      '#default_value': '0'
      '#format_items': comma
      '#min': 0
    totale_punteggio_graduatoria:
      '#type': webform_computed_twig
      '#title': 'Totale Punteggio Graduatoria'
      '#description': 'Calcolato/Aggiornato in automatico.'
      '#template': |-
        {% set tot_anzianita = data.totale_anzianita_servizio|render|striptags|trim|default(0)|float %}
        {% set tot_esigenze  = data.totale_esigenze_famiglia|render|striptags|trim|default(0)|float %}
        {% set tot_titoli    = data.totale_titoli_generali|render|striptags|trim|default(0)|float %}
        {{ tot_anzianita + tot_esigenze + tot_titoli }}
      '#store': true
    verifica_graduatoria_ds:
      '#type': radios
      '#title': 'Verifica Graduatoria DS'
      '#options':
        'Non Verificata': 'Non Verificata'
        'Verificata Parzialmente': 'Verificata Parzialmente'
        Verificata: Verificata
      '#required': true
      '#default_value': 'Non Verificata'
      '#private': true
      '#access_create_roles':
        - authenticated
      '#access_update_roles':
        - authenticated
      '#access_view_roles':
        - authenticated
