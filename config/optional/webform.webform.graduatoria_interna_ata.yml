langcode: it
status: open
dependencies:
  module:
    - webform_entity_print
third_party_settings:
  webform_entity_print:
    template:
      header: ''
      footer: ''
      css: ''
    export_types:
      pdf:
        enabled: true
        link_text: ''
        link_attributes: {  }
weight: 0
open: null
close: null
uid: 1
template: false
archive: false
id: graduatoria_interna_ata
title: '- Graduatoria Interna ATA -'
description: "<p>Tipo di form da utilizzare per creare la graduatoria interna ATA dell'istituto</p>"
categories: {  }
elements: |-
  dati_anagrafici:
    '#type': webform_wizard_page
    '#title': 'Dati Anagrafici'
    '#prev_button_label': 'Dati Anagrafici'
    '#next_button_label': 'Anzianità Di Servizio'
    intestazione:
      '#type': webform_flexbox
      processed_text:
        '#type': processed_text
        '#display_on': both
        '#text': '<p class="text-align-right"><strong>Al dirigente_scolastico SCOLASTICO</strong></p>'
        '#format': bootstrap_italia_2
    flex_dati_anagrafici:
      '#type': webform_flexbox
      '#align_items': center
      markup:
        '#type': webform_markup
        '#flex': 2
        '#display_on': both
        '#markup': 'Il/La sottoscritto/a'
      cognome:
        '#type': textfield
        '#title': Cognome
        '#autocomplete': 'off'
        '#readonly': true
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#flex': 2
        '#default_value': '[current-user:field_cognome]'
        '#format_items': comma
      nome:
        '#type': textfield
        '#title': Nome
        '#autocomplete': 'off'
        '#readonly': true
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#flex': 2
        '#default_value': '[current-user:field_nome]'
        '#format_items': comma
      nato:
        '#type': textfield
        '#title': 'Nato a'
        '#autocomplete': 'off'
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#flex': 2
        '#format_items': comma
      provincia:
        '#type': textfield
        '#title': Provincia
        '#autocomplete': 'off'
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#format_items': comma
    flex_dati_anagrafici2:
      '#type': webform_flexbox
      datanascita:
        '#type': date
        '#title': Il
        '#placeholder': gg/mm/aaaa
        '#required': true
        '#format': d-m-Y
        '#format_items': comma
        '#date_date_format': d-m-Y
      residente:
        '#type': textfield
        '#title': 'Residente In'
        '#description': 'Inserire indirizzo di residenza'
        '#autocomplete': 'off'
        '#input_mask': "'casing': 'upper'"
        '#required': true
        '#format_items': comma
      anno_di_titolarita_istituto:
        '#type': textfield
        '#title': "titolare presso codesto Istituto dall'anno"
        '#placeholder': aaaa/aaaa
        '#required': true
        '#pattern': '^\d{4}/\d{4}$'
        '#pattern_error': "Formato non valido. Inserire l'anno nel formato aaaa/aaaa (es. 2024/2025)"
    flex_datianagrafici3:
      '#type': webform_flexbox
      profilo:
        '#type': select
        '#title': Profilo
        '#options': profilo_ata
        '#required': true
      anno_scolastico_immissione_ruolo:
        '#type': textfield
        '#title': "Immesso in ruolo nell'anno scolastico"
        '#placeholder': aaaa/aaaa
        '#required': true
        '#pattern': '^\d{4}/\d{4}$'
        '#pattern_error': "Formato non valido. Inserire l'anno nel formato aaaa/aaaa (es. 2024/2025)"
      data_servizio:
        '#type': date
        '#title': 'Con effettiva assunzione in servizio dal'
        '#required': true
    e_mail:
      '#type': email
      '#title': E-mail
      '#description': 'Compilato in automatico'
      '#autocomplete': ''
      '#readonly': true
      '#required': true
      '#default_value': '[current-user:mail]'
      '#format_items': comma
    processed_text_01:
      '#type': processed_text
      '#display_on': both
